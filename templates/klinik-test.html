<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klinik Karar Testi - HantaRisk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Üst Menünün Kaymasını Engelleyen Taş Gibi Sabit CSS */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: #0b0d12;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            height: 70px;
            box-sizing: border-box;
        }
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-shrink: 0;
        }

        /* --- HAMBURGER MENÜ CSS BAŞLANGICI --- */
        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1001;
        }
        /* --- HAMBURGER MENÜ CSS BİTİŞİ --- */

        /* Test Sayfası Genel Yapısı */
        .test-container { max-width: 850px; margin: 8rem auto 4rem auto; padding: 0 1.5rem; }
        .test-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 3rem; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; position: relative; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { display: block; margin-bottom: 0.8rem; font-weight: 600; color: var(--text-main); font-size: 0.95rem; }
        
        .form-control { 
            width: 100%; 
            padding: 1rem; 
            background: #11141a !important; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            color: #ffffff !important; 
            font-size: 1rem; 
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .form-control:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px var(--primary-glow); }
        
        /* Şehir Arama Sonuç Listesi */
        .sehir-arama-listesi {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #171c26;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            z-index: 999;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .sehir-arama-kalemi { padding: 0.8rem 1rem; color: #ffffff; cursor: pointer; transition: background 0.2s ease; }
        .sehir-arama-kalemi:hover { background: var(--primary); color: white; }

        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-top: 0.5rem; }
        .checkbox-label { background: rgba(255,255,255,0.01); border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 0.8rem; transition: all 0.2s ease; font-size: 0.9rem; }
        .checkbox-label:hover { background: rgba(239, 68, 68, 0.03); border-color: rgba(239, 68, 68, 0.2); }
        
        /* Animasyonlu Sonuç Paneli */
        .result-panel { margin-top: 3rem; padding: 2.5rem; border-radius: 12px; display: none; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); }
        .animated-counter-box { text-align: center; margin-bottom: 1.5rem; }
        .animated-score { font-size: 4rem; font-weight: 800; color: var(--primary); text-shadow: 0 0 20px var(--primary-glow); line-height: 1; }
        .score-label { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 0.5rem; }
        
        .risk-badge { display: inline-block; padding: 0.5rem 1.5rem; border-radius: 50px; font-weight: 700; font-size: 1.1rem; margin-bottom: 1.5rem; text-align: center; }
        .badge-kritik { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #f87171; }
        .badge-yuksek { background: rgba(245, 158, 11, 0.15); border: 1px solid #f59e0b; color: #fbbf24; }
        .badge-dusuk { background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #34d399; }
        
        .oneriler-title { font-weight: 700; color: white; margin-bottom: 1rem; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .oneriler-list { padding-left: 1.2rem; margin-bottom: 2rem; list-style-type: none; }
        .oneriler-list li { color: var(--text-muted); margin-bottom: 0.8rem; font-size: 0.95rem; line-height: 1.6; word-break: break-word; white-space: normal; }
        
        .action-buttons { display: flex; gap: 1rem; }
        
        @media (max-width: 768px) {
            .test-card { padding: 1.5rem !important; }
            .form-grid { grid-template-columns: 1fr !important; gap: 0rem; }
            .action-buttons { flex-direction: column; }
            .test-container { margin-top: 6rem; }
            
            /* Sıkışma Ayarları */
            .result-panel { padding: 1.2rem !important; width: 100% !important; box-sizing: border-box !important; }
            .animated-score { font-size: 3rem !important; }
            .oneriler-list { padding-left: 0 !important; }
            .oneriler-list li { font-size: 0.9rem !important; line-height: 1.5 !important; }

            /* --- MOBİLDE HAMBURGERİ AKTİF EDEN VE BUTONLARI DÜZELTEN CSS --- */
            .hamburger-btn {
                display: block; /* Hamburger mobilde görünür */
            }
            .nav-menu {
                display: none; /* Varsayılan olarak gizli */
                flex-direction: column;
                position: absolute;
                top: 70px;
                left: 0;
                width: 100%;
                background: #0b0d12;
                padding: 1.5rem;
                box-sizing: border-box;
                border-bottom: 1px solid var(--border-color);
                gap: 1.5rem;
                align-items: flex-start;
            }
            .nav-menu.active {
                display: flex; /* Hamburgera basılınca açılır */
            }
            /* Mobilde acil sağlık kuruluş butonunun flex ezilmesini önleyen ayar */
            #btn-emergency {
                display: none; /* JavaScript tetikleyene kadar kapalı kalır */
            }
        }
    </style>
</head>
<body>

    <!-- Üst Menü -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <i class="fa-solid fa-virus-covid text-gradient"></i> HANTA<span class="text-gradient">RISK</span>
            </a>
            
            <!-- Hamburger Tetikleyici Buton -->
            <button class="hamburger-btn" id="hamburger-trigger">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="nav-menu" id="mobile-nav-menu">
                <a href="/" class="nav-link"><i class="fa-solid fa-house"></i> Ana Sayfa</a>
                <a href="/dashboard" class="nav-link"><i class="fa-solid fa-chart-line"></i> Analitik Pano</a>
                <a href="/surveillance" class="nav-link"><i class="fa-solid fa-earth-americas"></i> Küresel Harita</a>
                <a href="/klinik-test" class="nav-link active"><i class="fa-solid fa-stethoscope"></i> Klinik Karar Testi</a>
                <a href="/profil" class="nav-link"><i class="fa-solid fa-user-doctor"></i> Profilim</a>
            </div>
        </div>
    </nav>

    <!-- Test Alanı -->
    <div class="test-container">
        <div class="test-card">
            <h2 style="margin-bottom: 0.5rem;"><i class="fa-solid fa-microscope text-gradient"></i> Yapay Zeka Klinik Karar Testi</h2>
            <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Türkiye Bölgesel vaka semptom korelasyonu ve maruziyet analitik modülü.</p>
            
            <form id="hanta-test-form" autocomplete="off">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Adınız Soyadınız</label>
                        <input type="text" id="form-ad" class="form-control" required placeholder="Örn: Ahmet Yılmaz">
                    </div>
                    
                    <div class="form-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin: 0; padding: 0;">
                        <div class="form-group">
                            <label>Yaşınız (1 - 85)</label>
                            <input type="number" id="form-yas" class="form-control" required min="1" max="85" placeholder="Örn: 34">
                        </div>
                        <div class="form-group">
                            <label>Cinsiyet</label>
                            <select id="form-cinsiyet" class="form-control" required>
                                <option value="Erkek">Erkek</option>
                                <option value="Kadın">Kadın</option>
                                <option value="Belirtilmemiş">Belirtmek İstemiyorum</option>
                            </select>
                        </div>
                    </div>

                    <!-- Bölge Seçimi -->
                    <div class="form-group">
                        <label>Bulunduğunuz Coğrafi Bölge</label>
                        <select id="form-bolge" class="form-control" required>
                            <option value="">Bölge Seçiniz...</option>
                            <option value="Marmara">Marmara Bölgesi</option>
                            <option value="İç Anadolu">İç Anadolu Bölgesi</option>
                            <option value="Ege">Ege Bölgesi</option>
                            <option value="Akdeniz">Akdeniz Bölgesi</option>
                            <option value="Karadeniz">Karadeniz Bölgesi</option>
                            <option value="Güneydoğu Anadolu">Güneydoğu Anadolu Bölgesi</option>
                            <option value="Doğu Anadolu">Doğu Anadolu Bölgesi</option>
                        </select>
                    </div>

                    <!-- Yazarak Arama Alanı -->
                    <div class="form-group">
                        <label>Bulunduğunuz Şehir (Yazarak Arayın)</label>
                        <input type="text" id="form-sehir-input" class="form-control" required placeholder="Örn: İstanbul, Ankara, Gaziantep...">
                        <div id="sehir-dropdown" class="sehir-arama-listesi"></div>
                    </div>

                    <div class="form-group full-width">
                        <label>Çevresel Maruziyet Öyküsü (En Uygun Seçeneği Belirtiniz)</label>
                        <select id="form-cevre" class="form-control" required>
                            <option value="None">Belirgin bir maruziyet öyküsü yok (Kentsel Alan / Şehir Merkezi)</option>
                            <option value="Forest Exposure">Kırsal Alan / Ormanlık Bölgede Bulunma / Kamp ve Doğa Sporları</option>
                            <option value="Agricultural Exposure">Tarım / Tarla / Hasat Faaliyetleri ve Ahır Temizliği</option>
                            <option value="Home Infestation">Ev, Bodrum, Tavan Arası veya Depoda Aktif Kemirgen İstilası Öyküsü</option>
                            <option value="Occupational Risk">Mesleki Risk (Madencilik, İnşaat, Orman İşçiliği veya Lojistik)</option>
                            <option value="Laboratory Exposure">Viroloji / Sağlık Laboratuvarı Çalışanı veya Sağlık Sektörü Maruziyeti</option>
                            <option value="Rodent Contact">Doğrudan Temas (Kemirgen Isırması, Dışkı veya İdrar Salgısına Çıplak Elle Dokunma)</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Mevcut Semptomlar (Eşleşen Tüm Belirtileri Seçiniz)</label>
                        <div class="checkbox-grid">
                            <label class="checkbox-label"><input type="checkbox" class="semptom-check" value="Fever"> <i class="fa-solid fa-temperature-high" style="color:#ef4444;"></i> Ani Yüksek Ateş</label>
                            <label class="checkbox-label"><input type="checkbox" class="semptom-check" value="Breathing Shortness"> <i class="fa-solid fa-wind" style="color:#3b82f6;"></i> Nefes Darlığı / Akciğer Sıkışması</label>
                            <label class="checkbox-label"><input type="checkbox" class="semptom-check" value="Muscle Aches"> <i class="fa-solid fa-child" style="color:#f59e0b;"></i> Şiddetli Kas/Sırt Ağrıları</label>
                            <label class="checkbox-label"><input type="checkbox" class="semptom-check" value="Headache"> <i class="fa-solid fa-brain" style="color:#a855f7;"></i> Akut Baş Ağrısı</label>
                            <label class="checkbox-label"><input type="checkbox" class="semptom-check" value="Nausea/Vomiting"> <i class="fa-solid fa-toilet-paper" style="color:#10b981;"></i> Bulantı / Kusma</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1.2rem; margin-top: 1rem;"><i class="fa-solid fa-shield-virus"></i> Yapay Zeka Risk Analizini Başlat</button>
            </form>
            <div id="result-panel" class="result-panel">
                <div class="animated-counter-box">
                    <div id="animated-score" class="animated-score">%0</div>
                    <div class="score-label">Yapay Zeka Klinik Risk Skoru</div>
                </div>
                
                <div style="text-align: center;">
                    <div id="risk-badge" class="risk-badge">HESAPLANIYOR</div>
                </div>

                <div class="oneriler-title">
                    <i class="fa-solid fa-stethoscope text-gradient"></i> Klinik Karar Destek Önerileri:
                </div>
                <ul id="oneriler-list" class="oneriler-list"></ul>

                <div class="action-buttons">
                    <button id="btn-pdf" class="btn btn-outline" style="flex: 1; justify-content: center;"><i class="fa-solid fa-file-invoice"></i> Tıbbi Raporu Düzenli Sayfada Aç</button>
                    <a id="btn-emergency" href="#" target="_blank" class="btn btn-primary" style="flex: 1; justify-content: center; background: #ef4444; border-color: #ef4444; display: none !important; align-items: center; gap: 8px;"><i class="fa-solid fa-truck-medical"></i> Acil Sağlık Kuruluşu Bul</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- HAMBURGER MENÜ TETİKLEME MOTORU ---
        const hamburgerTrigger = document.getElementById('hamburger-trigger');
        const mobileNavMenu = document.getElementById('mobile-nav-menu');

        hamburgerTrigger.addEventListener('click', function(e) {
            e.stopPropagation();
            mobileNavMenu.classList.toggle('active');
            
            // Hamburger ikonunu dinamik değiştirir (Menü açıkken X yapar)
            const icon = hamburgerTrigger.querySelector('i');
            if (mobileNavMenu.classList.contains('active')) {
                icon.className = 'fa-solid fa-xmark';
            } else {
                icon.className = 'fa-solid fa-bars';
            }
        });

        // Menü açıkken dışarı tıklanırsa kapatır
        document.addEventListener('click', function(e) {
            if (!mobileNavMenu.contains(e.target) && e.target !== hamburgerTrigger) {
                mobileNavMenu.classList.remove('active');
                hamburgerTrigger.querySelector('i').className = 'fa-solid fa-bars';
            }
        });

        // --- ŞEHİR VE BÖLGE VERİ HAVUZU ---
        const tumSehirlerDizisi = {
            "Marmara": ["Balıkesir", "Bilecik", "Bursa", "Çanakkale", "Edirne", "İstanbul", "Kırklareli", "Kocaeli", "Sakarya", "Tekirdağ", "Yalova"],
            "İç Anadolu": ["Aksaray", "Ankara", "Çankırı", "Eskişehir", "Karaman", "Kayseri", "Kırıkkale", "Kırşehir", "Konya", "Nevşehir", "Niğde", "Sivas", "Yozgat"],
            "Ege": ["Afyonkarahisar", "Aydın", "Denizli", "İzmir", "Kütahya", "Manisa", "Muğla", "Uşak"],
            "Akdeniz": ["Adana", "Antalya", "Burdur", "Hatay", "Isparta", "Kahramanmaraş", "Mersin", "Osmaniye"],
            "Karadeniz": ["Amasya", "Artvin", "Bartın", "Bayburt", "Bolu", "Çorum", "Düzce", "Giresun", "Gümüşhane", "Karabük", "Kastamonu", "Ordu", "Rize", "Samsun", "Sinop", "Tokat", "Trabzon", "Zonguldak"],
            "Güneydoğu Anadolu": ["Adıyaman", "Batman", "Diyarbakır", "Gaziantep", "Kilis", "Mardin", "Şanlıurfa", "Siirt", "Şırnak"],
            "Doğu Anadolu": ["Ağrı", "Ardahan", "Bingöl", "Bitlis", "Elazığ", "Erzincan", "Erzurum", "Hakkari", "Iğdır", "Kars", "Malatya", "Muş", "Tunceli", "Van"]
        };

        const bolgeSelect = document.getElementById('form-bolge');
        const sehirInput = document.getElementById('form-sehir-input');
        const sehirDropdown = document.getElementById('sehir-dropdown');

        sehirInput.addEventListener('input', tetikleFiltreleme);
        sehirInput.addEventListener('focus', tetikleFiltreleme);

        function tetikleFiltreleme() {
            const secilenBolge = bolgeSelect.value;
            const arananKelime = sehirInput.value.trim().toLowerCase();
            sehirDropdown.innerHTML = '';

            let aranacakHavuz = [];
            if(secilenBolge && tumSehirlerDizisi[secilenBolge]) {
                aranacakHavuz = tumSehirlerDizisi[secilenBolge];
            } else {
                Object.values(tumSehirlerDizisi).forEach(b => { aranacakHavuz = aranacakHavuz.concat(b); });
            }

            aranacakHavuz = [...new Set(aranacakHavuz)].sort();

            const eslesenler = aranacakHavuz.filter(s => s.toLowerCase().indexOf(arananKelime) > -1);

            if(eslesenler.length > 0) {
                sehirDropdown.style.display = 'block';
                eslesenler.forEach(sehir => {
                    const oge = document.createElement('div');
                    oge.className = 'sehir-arama-kalemi';
                    oge.innerText = sehir;
                    oge.addEventListener('click', function() {
                        sehirInput.value = sehir;
                        sehirDropdown.style.display = 'none';
                        
                        for(let b in tumSehirlerDizisi) {
                            if(tumSehirlerDizisi[b].includes(sehir)) {
                                bolgeSelect.value = b;
                                break;
                            }
                        }
                    });
                    sehirDropdown.appendChild(oge);
                });
            } else {
                sehirDropdown.style.display = 'none';
            }
        }

        document.addEventListener('click', function(e) {
            if (e.target !== sehirInput) { sehirDropdown.style.display = 'none'; }
        });

        // --- FORM SUBMIT VE ANALİZ MOTORU ---
        document.getElementById('hanta-test-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const semptomlar = [];
            document.querySelectorAll('.semptom-check:checked').forEach(cb => { semptomlar.push(cb.value); });

            const payload = {
                ad: document.getElementById('form-ad').value,
                yas: document.getElementById('form-yas').value,
                cinsiyet: document.getElementById('form-cinsiyet').value,
                bolge: bolgeSelect.value,
                sehir: sehirInput.value,
                cevre_tipi: document.getElementById('form-cevre').value,
                semptomlar: semptomlar
            };

            fetch('/api/klinik-analiz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                const panel = document.getElementById('result-panel');
                panel.style.display = 'block';
                panel.scrollIntoView({ behavior: 'smooth' });

                let currentScore = 0;
                const targetScore = data.skor || Math.min(semptomlar.length * 20 + 10, 95);
                const counterElement = document.getElementById('animated-score');
                
                const interval = setInterval(() => {
                    if(currentScore >= targetScore) {
                        clearInterval(interval);
                        counterElement.innerText = `%${targetScore}`;
                    } else {
                        currentScore++;
                        counterElement.innerText = `%${currentScore}`;
                    }
                }, 15);

                const badge = document.getElementById('risk-badge');
                const riskSeviye = data.risk_seviyesi || (targetScore > 70 ? "KRİTİK" : targetScore > 40 ? "YÜKSEK RİSK" : "DÜŞÜK RİSK");
                badge.innerText = riskSeviye;
                badge.className = "risk-badge";
                
                const emergencyBtn = document.getElementById('btn-emergency');
                if(riskSeviye === "KRİTİK" || riskSeviye === "YÜKSEK RİSK") {
                    badge.classList.add(riskSeviye === "KRİTİK" ? 'badge-kritik' : 'badge-yuksek');
                    
                    // Mobilde ezilip kaybolmasını önleyen kararlı inline stil ataması
                    emergencyBtn.setAttribute("style", "display: flex !important; flex: 1; justify-content: center; background: #ef4444; border-color: #ef4444; align-items: center; gap: 8px;");
                    emergencyBtn.href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(payload.sehir + ' devlet hastanesi eğitim araştırma hastanesi')}`;
                } else {
                    badge.classList.add('badge-dusuk');
                    emergencyBtn.setAttribute("style", "display: none !important;");
                }

                const onerilerList = document.getElementById('oneriler-list');
                onerilerList.innerHTML = '';
                
                const varsayilanOneriler = data.oneriler || [
                    `Sayın ${payload.ad}, semptomlarınız ve konum parametreleriniz klinik algoritmalarımızca taranmıştır.`,
                    "Kemirgenlerin bulunabileceği ahır, bodrum, depo gibi kapalı alanların temizliğinden ve atıklarından uzak durun.",
                    "Hantavirüs şüphesi durumunda vakit kaybetmeden en yakın tam teşekküllü hastanenin Enfeksiyon Hastalıkları servisine danışın.",
                    "Hekiminize başvurduğunuzda kırsal maruziyet geçmişinizi, tarım veya kemirgen temas öykünüzü eksiksiz aktarın."
                ];
                
                varsayilanOneriler.forEach(oneri => {
                    onerilerList.innerHTML += `<li><i class="fa-solid fa-circle-dot" style="font-size:0.6rem; color:var(--primary); margin-right:8px; vertical-align: middle;"></i> <span>${oneri}</span></li>`;
                });

                // --- PREMIUM MEDİKAL PDF RAPOR MODÜLÜ ---
                document.getElementById('btn-pdf').onclick = function() {
                    const cevreMetni = document.getElementById('form-cevre').options[document.getElementById('form-cevre').selectedIndex].text;
                    const semptomMetni = semptomlar.join(', ') || 'Belirtilmedi';
                    const tarihMetni = new Date().toLocaleString('tr-TR');
                    
                    let oneriLiElementleri = '';
                    varsayilanOneriler.forEach(o => {
                        oneriLiElementleri += `<li style="margin-bottom:12px; font-size:15px; color:#334155; line-height:1.6;">${o}</li>`;
                    });

                    const yeniPencere = window.open('', '_blank');
                    yeniPencere.document.write(`
                        <html>
                        <head>
                            <title>HantaRisk Klinik Raporu - ${payload.ad}</title>
                            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
                            <style>
                                body { font-family: 'Inter', sans-serif; background-color: #ffffff; padding: 20px; margin: 0; color: #1e293b; }
                                .rapor-kart { max-width: 750px; margin: 0 auto; background: #ffffff; padding: 30px; border: 1px solid #e2e8f0; border-radius: 8px; }
                                .baslik-alani { border-bottom: 3px solid #dc2626; padding-bottom: 15px; margin-bottom: 25px; text-align: center; }
                                .ana-baslik { margin: 0; color: #dc2626; font-size: 24px; font-weight: 800; letter-spacing: 0.5px; }
                                .alt-baslik { margin: 6px 0 0 0; color: #64748b; font-size: 13px; text-transform: uppercase; font-weight: 600; }
                                .bolum-basligi { font-size: 15px; font-weight: 700; color: #0f172a; border-left: 4px solid #dc2626; padding-left: 10px; margin: 25px 0 12px 0; text-transform: uppercase; }
                                .bilgi-tablosu { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
                                .bilgi-tablosu td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
                                .alan-adi { font-weight: 600; color: #475569; width: 35%; }
                                .alan-deger { color: #0f172a; }
                                .skor-kutusu { background: #fdf2f2; border: 1px solid #fde2e2; border-radius: 6px; padding: 20px; text-align: center; margin: 20px 0; page-break-inside: avoid; }
                                .skor-rakam { font-size: 36px; font-weight: 800; color: #dc2626; margin: 2px 0; }
                                .skor-seviye { display: inline-block; padding: 5px 18px; background: #dc2626; color: #ffffff; border-radius: 50px; font-weight: 700; font-size: 13px; margin-top: 5px; }
                                .not-alani { margin-top: 40px; border-top: 1px solid #e2e8f0; padding-top: 15px; font-size: 11px; color: #94a3b8; text-align: center; line-height: 1.5; }
                                @media print {
                                    body { padding: 0; margin: 0; background: #fff; }
                                    .rapor-kart { border: none; padding: 0; width: 100%; }
                                    button, .no-print { display: none !important; }
                                }
                            </style>
                        </head>
                        <body>
                            <div class="rapor-kart">
                                <div class="baslik-alani">
                                    <h1 class="ana-baslik">HANTARISK TÜRKİYE TIBBİ ANALİZ RAPORU</h1>
                                    <div class="alt-baslik">Klinik Karar Destek Otomasyon Belgesi</div>
                                </div>

                                <div class="bolum-basligi">Hasta Kimlik Bilgileri</div>
                                <table class="bilgi-tablosu">
                                    <tr>
                                        <td class="alan-adi">Adı Soyadı</td>
                                        <td class="alan-deger">${payload.ad}</td>
                                    </tr>
                                    <tr>
                                        <td class="alan-adi">Yaş / Cinsiyet</td>
                                        <td class="alan-deger">${payload.yas} / ${payload.cinsiyet}</td>
                                    </tr>
                                    <tr>
                                        <td class="alan-adi">Coğrafi Konum</td>
                                        <td class="alan-deger">${payload.sehir} / ${payload.bolge} Bölgesi</td>
                                    </tr>
                                    <tr>
                                        <td class="alan-adi">Rapor Tarihi</td>
                                        <td class="alan-deger">${tarihMetni}</td>
                                    </tr>
                                </table>

                                <div class="bolum-basligi">Klinik Bulgular ve Maruziyet</div>
                                <table class="bilgi-tablosu">
                                    <tr>
                                        <td class="alan-adi">Çevresel Öykü</td>
                                        <td class="alan-deger">${cevreMetni}</td>
                                    </tr>
                                    <tr>
                                        <td class="alan-adi">Mevcut Semptomlar</td>
                                        <td class="alan-deger">${semptomMetni}</td>
                                    </tr>
                                </table>

                                <div class="skor-kutusu">
                                    <div style="font-size: 12px; color: #7f1d1d; font-weight: 600; text-transform: uppercase;">Yapay Zeka Klinik Hesaplama Skoru</div>
                                    <div class="skor-rakam">%${targetScore}</div>
                                    <div class="skor-seviye">${riskSeviye}</div>
                                </div>

                                <div class="bolum-basligi">Hekim Karar Destek Önerileri</div>
                                <ul style="padding-left: 20px; margin: 0;">
                                    ${oneriLiElementleri}
                                </ul>

                                <div class="not-alani">
                                    * Bu doküman HantaRisk yazılım algoritmaları tarafından klinik veri korelasyonu kullanılarak otomatik üretilmiştir. Kesin tıbbi tanı ve teşhis yerine geçmez. Doğrulama için spesifik laboratuvar testleri yapılmalıdır.
                                </div>
                            </div>
                            <script>
                                window.onload = function() {
                                    setTimeout(function() { window.print(); }, 300);
                                };
                            <\/script>
                        </body>
                        </html>
                    `);
                    yeniPencere.document.close();
                };
            });
        });
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
