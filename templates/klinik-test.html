<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klinik Karar Testi - HantaRisk</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Gelişmiş Test Sayfası Tasarımı */
        .test-container { max-width: 850px; margin: 8rem auto 4rem auto; padding: 0 1.5rem; }
        .test-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 16px; padding: 3rem; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .form-group { margin-bottom: 1.5rem; position: relative; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-group label { display: block; margin-bottom: 0.8rem; font-weight: 600; color: var(--text-main); font-size: 0.95rem; }
        
        /* WhatsApp Image 2026-05-24 at 21.16.55.jpeg Beyaz Ekran Hatasını Çözen Lüks Form Kontrolleri */
        .form-control { 
            width: 100%; 
            padding: 1rem; 
            background: #11141a !important; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            color: #ffffff !important; 
            font-size: 1rem; 
            transition: all 0.3s ease;
            appearance: none; 
            -webkit-appearance: none;
            -moz-appearance: none;
        }
        
        .form-control option {
            background-color: #11141a !important;
            color: #ffffff !important;
            padding: 12px;
        }

        .form-control:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px var(--primary-glow); }
        
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-top: 0.5rem; }
        .checkbox-label { background: rgba(255,255,255,0.01); border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 0.8rem; transition: all 0.2s ease; font-size: 0.9rem; }
        .checkbox-label:hover { background: rgba(239, 68, 68, 0.03); border-color: rgba(239, 68, 68, 0.2); }
        .checkbox-label input { width: 18px; height: 18px; accent-color: var(--primary); }
        
        /* Animasyonlu Sonuç Paneli */
        .result-panel { margin-top: 3rem; padding: 2.5rem; border-radius: 12px; display: none; background: rgba(255,255,255,0.02); border: 1px solid var(--border-color); }
        .animated-counter-box { text-align: center; margin-bottom: 1.5rem; }
        .animated-score { font-size: 4rem; font-weight: 800; color: var(--primary); text-shadow: 0 0 20px var(--primary-glow); line-height: 1; }
        .score-label { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 0.5rem; }
        
        .risk-badge { display: inline-block; padding: 0.5rem 1.5rem; border-radius: 50px; font-weight: 700; font-size: 1.1rem; margin-bottom: 1.5rem; text-align: center; }
        .badge-kritik { background: rgba(239, 68, 68, 0.15); border: 1px solid #ef4444; color: #f87171; }
        .badge-yuksek { background: rgba(245, 158, 11, 0.15); border: 1px solid #f59e0b; color: #fbbf24; }
        .badge-orta { background: rgba(59, 130, 246, 0.15); border: 1px solid #3b82f6; color: #60a5fa; }
        .badge-dusuk { background: rgba(16, 185, 129, 0.15); border: 1px solid #10b981; color: #34d399; }
        
        .oneriler-title { font-weight: 700; color: white; margin-bottom: 1rem; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .oneriler-list { padding-left: 1.2rem; margin-bottom: 2rem; }
        .oneriler-list li { color: var(--text-muted); margin-bottom: 0.6rem; font-size: 0.95rem; line-height: 1.5; }
        
        .action-buttons { display: flex; gap: 1rem; }
        
        @media (max-width: 768px) {
            .test-card { padding: 1.5rem !important; }
            .form-grid { grid-template-columns: 1fr !important; gap: 0rem; }
            .animated-score { font-size: 3rem !important; }
            .action-buttons { flex-direction: column; }
            .action-buttons .btn { width: 100%; justify-content: center; }
            .test-container { margin-top: 6rem; }
            h2 { font-size: 1.4rem !important; }
        }
    </style>
</head>
<body>

    <!-- Üst Menü (Navbar) -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <i class="fa-solid fa-virus-covid text-gradient"></i> HANTA<span class="text-gradient">RISK</span>
            </a>
            <div class="menu-toggle" id="mobile-menu-btn">
                <i class="fa-solid fa-bars"></i>
            </div>
            <div class="nav-menu" id="nav-menu-container">
                <a href="/" class="nav-link"><i class="fa-solid fa-house"></i> Ana Sayfa</a>
                <a href="/dashboard" class="nav-link"><i class="fa-solid fa-chart-line"></i> Analitik Pano</a>
                <a href="/surveillance" class="nav-link"><i class="fa-solid fa-earth-americas"></i> Küresel Harita</a>
                <a href="/klinik-test" class="nav-link active"><i class="fa-solid fa-stethoscope"></i> Klinik Karar Testi</a>
                <a href="/profil" class="nav-link"><i class="fa-solid fa-user-doctor"></i> Profilim</a>
            </div>
        </div>
    </nav>

    <!-- Test Alanı -->
    <div class="test-container">
        <div class="test-card">
            <h2 style="margin-bottom: 0.5rem;"><i class="fa-solid fa-microscope text-gradient"></i> Yapay Zeka Klinik Karar Testi</h2>
            <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Türkiye Bölgesel vaka semptom korelasyonu ve maruziyet analitik modülü.</p>
            
            <form id="hanta-test-form" autocomplete="off">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Adınız Soyadınız</label>
                        <input type="text" id="form-ad" class="form-control" required placeholder="Örn: Ahmet Yılmaz">
                    </div>
                    
                    <div class="form-grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin: 0; padding: 0;">
                        <div class="form-group">
                            <label>Yaşınız (1 - 85)</label>
                            <input type="number" id="form-yas" class="form-control" required min="1" max="85" placeholder="Örn: 34">
                        </div>
                        <div class="form-group">
                            <label>Cinsiyet</label>
                            <select id="form-cinsiyet" class="form-control" required>
                                <option value="Erkek">Erkek</option>
                                <option value="Kadın">Kadın</option>
                                <option value="Belirtilmemiş">Belirtmek İstemiyorum</option>
                            </select>
                        </div>
                    </div>

                    <!-- Doğrudan Bölge Seçimi -->
                    <div class="form-group">
                        <label>Bulunduğunuz Coğrafi Bölge</label>
                        <select id="form-bolge" class="form-control" required>
                            <option value="">Bölge Seçiniz...</option>
                            <option value="Marmara">Marmara Bölgesi</option>
                            <option value="İç Anadolu">İç Anadolu Bölgesi</option>
                            <option value="Ege">Ege Bölgesi</option>
                            <option value="Akdeniz">Akdeniz Bölgesi</option>
                            <option value="Karadeniz">Karadeniz Bölgesi</option>
                            <option value="Güneydoğu Anadolu">Güneydoğu Anadolu Bölgesi</option>
                            <option value="Doğu Anadolu">Doğu Anadolu Bölgesi</option>
                        </select>
                    </div>

                    <!-- Bölgeye Göre Filtrelenen Eksiksiz 81 İl -->
                    <div class="form-group">
                        <label>Bulunduğunuz Şehir (İl)</label>
                        <select id="form-sehir" class="form-control" required>
                            <option value="">Önce Bölge Seçiniz...</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Çevresel Maruziyet Öyküsü (En Uygun Seçeneği Belirtiniz)</label>
                        <select id="form-cevre" class="form-control" required>
                            <option value="None">Belirgin bir maruziyet öyküsü yok (Kentsel Alan / Şehir Merkezi)</option>
                            <option value="Forest Exposure">Kırsal Alan / Ormanlık Bölgede Bulunma / Kamp ve Doğa Sporları</option>
                            <option value="Agricultural Exposure">Tarım / Tarla / Hasat Faaliyetleri ve Ahır Temizliği</option>
                            <option value="Home Infestation">Ev, Bodrum, Tavan Arası veya Depoda Aktif Kemirgen İstilası Öyküsü</option>
                            <option value="Occupational Risk">Mesleki Risk (Madencilik, İnşaat, Orman İşçiliği veya Lojistik)</option>
                            <option value="Laboratory Exposure">Viroloji / Sağlık Laboratuvarı Çalışanı veya Sağlık Sektörü Maruziyeti</option>
                            <option value="Rodent Contact">Doğrudan Temas (Kemirgen Isırması, Dışkı veya İdrar Salgısına Çıplak Elle Dokunma)</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Mevcut Semptomlar (Eşleşen Tüm Belirtileri Seçiniz)</label>
                        <div class="checkbox-grid">
                            <label class="checkbox-label"><input type="checkbox" class="semptom-check" value="Fever"> <i class="fa-solid fa-temperature-high" style="color:#ef4444;"></i> Ani Yüksek Ateş</label>
                            <label class="checkbox-label"><input type="checkbox" class="semptom-check" value="Breathing Shortness"> <i class="fa-solid fa-wind" style="color:#3b82f6;"></i> Nefes Darlığı / Akciğer Sıkışması</label>
                            <label class="checkbox-label"><input type="checkbox" class="semptom-check" value="Muscle Aches"> <i class="fa-solid fa-child" style="color:#f59e0b;"></i> Şiddetli Kas/Sırt Ağrıları</label>
                            <label class="checkbox-label"><input type="checkbox" class="semptom-check" value="Headache"> <i class="fa-solid fa-brain" style="color:#a855f7;"></i> Akut Baş Ağrısı</label>
                            <label class="checkbox-label"><input type="checkbox" class="semptom-check" value="Nausea/Vomiting"> <i class="fa-solid fa-toilet-paper" style="color:#10b981;"></i> Bulantı / Kusma</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1.2rem; margin-top: 1rem;"><i class="fa-solid fa-shield-virus"></i> Yapay Zeka Risk Analizini Başlat</button>
            </form>

            <!-- Lüks Sonuç Ekranı Modülü -->
            <div id="result-panel" class="result-panel">
                <div class="animated-counter-box">
                    <div id="animated-score" class="animated-score">%0</div>
                    <div class="score-label">Yapay Zeka Klinik Risk Skoru</div>
                </div>
                
                <div style="text-align: center;">
                    <div id="risk-badge" class="risk-badge">HESAPLANIYOR</div>
                </div>

                <div class="oneriler-title">
                    <i class="fa-solid fa-stethoscope text-gradient"></i> Klinik Karar Destek Önerileri:
                </div>
                <ul id="oneriler-list" class="oneriler-list"></ul>

                <div class="action-buttons">
                    <button id="btn-pdf" class="btn btn-outline" style="flex: 1; justify-content: center;"><i class="fa-solid fa-file-pdf"></i> Tıbbi Raporu PDF İndir</button>
                    <a id="btn-emergency" href="https://maps.google.com/?q=en+yakin+hastane" target="_blank" class="btn btn-primary" style="flex: 1; justify-content: center; background: #ef4444; border-color: #ef4444; display: none;"><i class="fa-solid fa-truck-medical"></i> Acil Sağlık Kuruluşu Bul</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Türkiye'nin 81 İlinin Eksiksiz ve Tam Listesi
        const turkiyeBolgeSehirEşleşmesi = {
            "Marmara": ["Balıkesir", "Bilecik", "Bursa", "Çanakkale", "Edirne", "İstanbul", "Kırklareli", "Kocaeli", "Sakarya", "Tekirdağ", "Yalova"],
            "İç Anadolu": ["Aksaray", "Ankara", "Çankırı", "Eskişehir", "Karaman", "Kayseri", "Kırıkkale", "Kırşehir", "Konya", "Nevşehir", "Niğde", "Sivas", "Yozgat"],
            "Ege": ["Afyonkarahisar", "Aydın", "Denizli", "İzmir", "Kütahya", "Manisa", "Muğla", "Uşak"],
            "Akdeniz": ["Adana", "Antalya", "Burdur", "Hatay", "Isparta", "Kahramanmaraş", "Mersin", "Osmaniye"],
            "Karadeniz": ["Amasya", "Artvin", "Bartın", "Bayburt", "Bolu", "Çorum", "Düzce", "Giresun", "Gümüşhane", "Karabük", "Kastamonu", "Ordu", "Rize", "Samsun", "Sinop", "Tokat", "Trabzon", "Zonguldak"],
            "Güneydoğu Anadolu": ["Adıyaman", "Batman", "Diyarbakır", "Gaziantep", "Kilis", "Mardin", "Şanlıurfa", "Siirt", "Şırnak"],
            "Doğu Anadolu": ["Ağrı", "Ardahan", "Bingöl", "Bitlis", "Elazığ", "Erzincan", "Erzurum", "Hakkari", "Iğdır", "Kars", "Malatya", "Muş", "Tunceli", "Van"]
        };

        const bolgeSelect = document.getElementById('form-bolge');
        const sehirSelect = document.getElementById('form-sehir');

        // Bölge Seçildiğinde İlgili İlleri Sıralayan Fonksiyon
        bolgeSelect.addEventListener('change', function() {
            const secilenBolge = this.value;
            sehirSelect.innerHTML = '<option value="">Şehir Seçiniz...</option>';
            
            if(secilenBolge && turkiyeBolgeSehirEşleşmesi[secilenBolge]) {
                turkiyeBolgeSehirEşleşmesi[secilenBolge].forEach(il => {
                    sehirSelect.innerHTML += `<option value="${il}">${il}</option>`;
                });
            } else {
                sehirSelect.innerHTML = '<option value="">Önce Bölge Seçiniz...</option>';
            }
        });

        // Form Gönderme ve Yapay Zeka Risk Hesaplama Modülü
        document.getElementById('hanta-test-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const semptomlar = [];
            document.querySelectorAll('.semptom-check:checked').forEach(cb => {
                semptomlar.push(cb.value);
            });

            const payload = {
                ad: document.getElementById('form-ad').value,
                yas: document.getElementById('form-yas').value,
                cinsiyet: document.getElementById('form-cinsiyet').value,
                bolge: bolgeSelect.value,
                sehir: sehirSelect.value,
                cevre_tipi: document.getElementById('form-cevre').value,
                semptomlar: semptomlar
            };

            fetch('/api/klinik-analiz', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                const panel = document.getElementById('result-panel');
                panel.style.display = 'block';
                panel.scrollIntoView({ behavior: 'smooth' });

                let currentScore = 0;
                const targetScore = data.skor || Math.min(semptomlar.length * 20 + 10, 95);
                const counterElement = document.getElementById('animated-score');
                
                const interval = setInterval(() => {
                    if(currentScore >= targetScore) {
                        clearInterval(interval);
                        counterElement.innerText = `%${targetScore}`;
                    } else {
                        currentScore++;
                        counterElement.innerText = `%${currentScore}`;
                    }
                }, 15);

                const badge = document.getElementById('risk-badge');
                const riskSeviye = data.risk_seviyesi || (targetScore > 70 ? "KRİTİK" : targetScore > 40 ? "YÜKSEK RİSK" : "DÜŞÜK RİSK");
                badge.innerText = riskSeviye;
                badge.className = "risk-badge";
                
                const emergencyBtn = document.getElementById('btn-emergency');
                if(riskSeviye === "KRİTİK" || riskSeviye === "YÜKSEK RİSK") {
                    badge.classList.add(riskSeviye === "KRİTİK" ? 'badge-kritik' : 'badge-yuksek');
                    emergencyBtn.style.display = 'flex';
                } else {
                    badge.classList.add('badge-dusuk');
                    emergencyBtn.style.display = 'none';
                }

                const onerilerList = document.getElementById('oneriler-list');
                onerilerList.innerHTML = '';
                const varsayilanOneriler = data.oneriler || [
                    "Lütfen en yakın sağlık kuruluşuna başvurarak Hantavirüs spesifik PCR veya IgM/IgG seroloji testi talep ediniz.",
                    "Belirtilerinizi günlük olarak izole bir ortamda takip edin."
                ];
                varsayilanOneriler.forEach(oneri => {
                    onerilerList.innerHTML += `<li><i class="fa-solid fa-circle-dot" style="font-size:0.7rem; color:var(--primary); margin-right:8px;"></i> ${oneri}</li>`;
                });

                document.getElementById('btn-pdf').onclick = function() {
                    let raporIcerik = `HANTARISK TÜRKİYE KLİNİK KARAR DESTEK RAPORU\n=================================================\nHasta Adı Soyadı: ${payload.ad}\nYaş / Cinsiyet: ${payload.yas} / ${payload.cinsiyet}\nLokasyon: ${payload.sehir} / ${payload.bolge} Bölgesi\nÇevresel Öykü: ${payload.cevre_tipi}\n=================================================\nKLİNİK RİSK SKORU: %${targetScore}\nRİSK SEVİYESİ: ${riskSeviye}\n=================================================\nHEKİM TAVSİYE VE ÖNERİLERİ:\n`;
                    varsayilanOneriler.forEach((o, index) => { raporIcerik += `${index + 1}. ${o}\n`; });
                    raporIcerik += `\n* Bu rapor yapay zeka algoritması ile üretilmiştir. Kesin tanı için laboratuvar doğrulaması şarttır.`;
                    
                    const blob = new Blob([raporIcerik], { type: "text/plain;charset=utf-8" });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `HantaRisk_Turkiye_Rapor_${payload.ad.replace(/\s+/g, '_')}.txt`;
                    link.click();
                };
            });
        });
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
